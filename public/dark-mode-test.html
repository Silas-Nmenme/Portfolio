<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background-color: #0d1117;
            color: #e9ecef;
        }

        .navbar {
            background-color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode .navbar {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #e9ecef;
        }

        #themeToggle {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #themeToggle:hover {
            background-color: #0d6efd;
            color: white;
            transform: scale(1.1);
        }

        body.dark-mode #themeToggle {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        body.dark-mode #themeToggle:hover {
            background-color: #58a6ff;
            color: #0d1117;
        }

        .content {
            padding: 20px;
            background: white;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        body.dark-mode .content {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #e9ecef;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h3>Test Portfolio</h3>
        <button id="themeToggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
    </nav>

    <div class="content">
        <h1>Silas O. Nmenme</h1>
        <p>This is a test of the dark mode functionality. Click the moon/sun icon to toggle between light and dark themes.</p>
        <p>The dark mode should provide good contrast and visibility for all text and elements.</p>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            themeToggle.title = 'Switch to Light Mode';
        } else {
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            themeToggle.title = 'Switch to Dark Mode';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);

            if (theme === 'dark') {
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                themeToggle.title = 'Switch to Light Mode';
            } else {
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                themeToggle.title = 'Switch to Dark Mode';
            }
        });
    </script>
</body>
</html>
